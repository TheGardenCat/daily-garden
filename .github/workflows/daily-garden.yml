name: Daily Garden

on:
  workflow_dispatch:
  schedule:
    - cron: '1 7 * * *'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install nostr-tools ws @scure/base
      - name: Run publisher
        run: node publisher.js
        env:
          NOSTR_PRIVATE_KEY: ${{ secrets.NOSTR_PRIVATE_KEY }}
